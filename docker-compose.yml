# Photo portfolio stack. Two services behind one nginx (the `web` service).
# Works with Docker (TrueNAS) and Finch (dev MacBook): `finch compose up -d`.
#
# Persistence (two volumes for an SSD/HDD split):
#   /data      → DB + served variants (full/thumb) + covers + signature + tmp-zips.
#                Latency-sensitive + frequently read → put on SSD (DATA_PATH).
#   /originals → full-resolution uploaded originals (write-once, large, read only
#                on download). Bulk storage → put on HDD (ORIGINALS_PATH).
# For a single-volume setup, just point ORIGINALS_PATH at <DATA_PATH>/originals
# (or leave it default). On TrueNAS, map these at dataset paths (see README).
# Data survives rebuilds.

services:
  api:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATA_DIR=/data
      - ORIGINALS_DIR=/originals
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET in .env}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH:?set ADMIN_PASSWORD_HASH in .env}
      - ZIP_TTL_MINUTES=${ZIP_TTL_MINUTES:-10}
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-100}
      - FULL_MAX_EDGE=${FULL_MAX_EDGE:-2560}
      - FULL_QUALITY=${FULL_QUALITY:-82}
    volumes:
      - ${DATA_PATH:-./data}:/data                       # SSD: DB + variants
      - ${ORIGINALS_PATH:-./data/originals}:/originals    # HDD: full-res originals
    expose:
      - "4000"

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      # Host port → nginx. Point Nginx Proxy Manager's proxy host at this.
      - "${WEB_PORT:-8080}:80"
