# Single internal nginx: serves the built SPA and reverse-proxies /api to the
# backend. Sits behind Nginx Proxy Manager (which terminates TLS for the public
# domain thienq.ddnss.de). Same origin → no CORS needed.

# Detect link-preview crawlers (WhatsApp, Signal, Telegram, iMessage, Slack,
# Facebook, X/Twitter, Discord, LinkedIn, Google, generic bots). These don't run
# JS, so album/private page requests from them are routed to the backend OG
# endpoint (album-specific meta tags + cover image) instead of the SPA shell.
map $http_user_agent $is_preview_bot {
    default                 0;
    "~*facebookexternalhit" 1;
    "~*Facebot"             1;
    "~*Twitterbot"          1;
    "~*WhatsApp"            1;
    "~*Slackbot"            1;
    "~*Telegram"            1;
    "~*Discordbot"          1;
    "~*LinkedInBot"         1;
    "~*Pinterest"           1;
    "~*redditbot"           1;
    "~*Google"              1;
    "~*Applebot"            1;
    "~*SkypeUriPreview"     1;
    "~*vkShare"             1;
    "~*W3C_Validator"       1;
    "~*Signal"              1;
    "~*bot"                 1;
    "~*preview"             1;
}

# Preserve the ORIGINAL scheme from the outer proxy (Nginx Proxy Manager
# terminates TLS and forwards over http). Without this, $scheme here is "http"
# and og:url/og:image would be emitted as http on an https page — which several
# messengers refuse to load. Fall back to $scheme only if NPM sent nothing.
map $http_x_forwarded_proto $client_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

# Defining the backend as an upstream lets proxy_pass targets that contain
# variables (the OG routes below use a $1 capture) resolve the "api" name via
# this server group — without needing a separate `resolver` directive.
upstream api_backend {
    server api:4000;
}

server {
    listen 80;
    server_name _;

    # Allow large photo uploads through to the API.
    client_max_body_size 200m;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy to the backend `api` service. The hostname resolves at startup via
    # the standard chain (incl. /etc/hosts), which works on both Docker and
    # Finch/nerdctl. NOTE: if you recreate ONLY the api container (giving it a
    # new IP) while web keeps running, restart web too (`compose restart web`)
    # so it picks up the new address. A full `compose up`/`restart` is fine.
    location /api/ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $client_proto;
        # Streaming downloads (zips, originals) can take a while.
        proxy_read_timeout 600s;
        proxy_buffering off;
    }

    # Long-cache hashed static assets produced by Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Link-preview crawlers hitting an album page get server-rendered OG tags
    # from the backend; everyone else falls through to the SPA. The regex
    # captures the album slug and maps /albums/<slug> and /private/<slug> to the
    # backend OG HTML route. Humans (is_preview_bot=0) skip straight to the SPA.
    # NOTE: named captures (?<album_slug>…) are used deliberately. A positional
    # capture ($1) from a location regex is NOT preserved inside an `if` block —
    # nginx resets numbered captures there — which would proxy an empty slug.
    # Named captures set a variable that survives into the `if`.
    location ~ ^/albums/(?<album_slug>[^/]+)/?$ {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $client_proto;
        if ($is_preview_bot) {
            proxy_pass http://api_backend/api/og/albums/$album_slug;
        }
        try_files $uri /index.html;
    }
    location ~ ^/private/(?<album_slug>[^/]+)/?$ {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $client_proto;
        if ($is_preview_bot) {
            proxy_pass http://api_backend/api/og/albums/$album_slug;
        }
        try_files $uri /index.html;
    }

    # SPA fallback: every other route serves index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
