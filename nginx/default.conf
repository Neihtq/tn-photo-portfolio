# Single internal nginx: serves the built SPA and reverse-proxies /api to the
# backend. Sits behind Nginx Proxy Manager (which terminates TLS for the public
# domain thienq.ddnss.de). Same origin → no CORS needed.

server {
    listen 80;
    server_name _;

    # Allow large photo uploads through to the API.
    client_max_body_size 200m;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy to the backend `api` service. The hostname resolves at startup via
    # the standard chain (incl. /etc/hosts), which works on both Docker and
    # Finch/nerdctl. NOTE: if you recreate ONLY the api container (giving it a
    # new IP) while web keeps running, restart web too (`compose restart web`)
    # so it picks up the new address. A full `compose up`/`restart` is fine.
    location /api/ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Streaming downloads (zips, originals) can take a while.
        proxy_read_timeout 600s;
        proxy_buffering off;
    }

    # Long-cache hashed static assets produced by Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: every other route serves index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
